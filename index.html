<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Agape Care Medical Transportation</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #ffffff;
            --star-color: #ffcc00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            max-width: 600px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
        }

        .logo {
            max-width: 150px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        p.description {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        /* Star Rating System */
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 5px;
        }

        .star-rating input[type="radio"] {
            display: none;
        }

        .star-rating label {
            font-size: 2.5rem;
            color: #ddd;
            cursor: pointer;
            transition: color 0.2s;
            margin: 0;
            display: inline-block;
        }

        .star-rating input[type="radio"]:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: var(--star-color);
        }

        button.submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button.submit-btn:hover {
            background-color: #004494;
        }

        button.submit-btn:disabled {
            background-color: #999;
            cursor: not-allowed;
        }

        #thank-you-message {
            display: none;
            padding: 40px 20px;
        }

        #thank-you-message h2 {
            color: #28a745;
            margin-bottom: 15px;
        }

        #thank-you-message p {
            font-size: 1.1rem;
            color: #555;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            .star-rating label {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/Waeil55/Agape-Care/main/AgapeLogo.jpeg" alt="Agape Care Logo" class="logo">
        
        <div id="form-container">
            <h1>We Value Your Feedback</h1>
            <p class="description">Please let us know how your experience was with Agape Care Medical Transportation.</p>
            
            <form id="feedback-form">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_subject" value="New Agape Care Feedback!">

                <div class="form-group">
                    <label for="driverName">Driver's Name (Optional)</label>
                    <input type="text" id="driverName" name="Driver Name" placeholder="Enter driver's name">
                </div>

                <div class="form-group">
                    <label for="serviceType">Type of Service</label>
                    <select id="serviceType" name="Service Type" required>
                        <option value="" disabled selected>Select an option</option>
                        <option value="Wheelchair Transport">Wheelchair Transport</option>
                        <option value="Ambulatory Transport">Ambulatory Transport</option>
                        <option value="Stretcher Transport">Stretcher Transport</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Was the driver on time for your scheduled pickup?</label>
                    <div class="radio-group">
                        <label><input type="radio" name="On Time" value="Yes" required> Yes</label>
                        <label><input type="radio" name="On Time" value="No"> No</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Overall Rating</label>
                    <div class="star-rating">
                        <input type="radio" id="star5" name="Rating" value="5 Stars" required />
                        <label for="star5" title="5 stars">&#9733;</label>
                        
                        <input type="radio" id="star4" name="Rating" value="4 Stars" />
                        <label for="star4" title="4 stars">&#9733;</label>
                        
                        <input type="radio" id="star3" name="Rating" value="3 Stars" />
                        <label for="star3" title="3 stars">&#9733;</label>
                        
                        <input type="radio" id="star2" name="Rating" value="2 Stars" />
                        <label for="star2" title="2 stars">&#9733;</label>
                        
                        <input type="radio" id="star1" name="Rating" value="1 Star" />
                        <label for="star1" title="1 star">&#9733;</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="feedback">Your Feedback</label>
                    <textarea id="feedback" name="Feedback" placeholder="Tell us about your experience..." required></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Submit Feedback</button>
            </form>
        </div>

        <div id="thank-you-message">
            <h2>Thank You!</h2>
            <p>Thank you for the feedback. We appreciate your time and trust in Agape Care Medical Transportation.</p>
        </div>
    </div>

    <script>
        document.getElementById('feedback-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const form = e.target;
            const submitBtn = document.getElementById('submitBtn');
            const formContainer = document.getElementById('form-container');
            const thankYouMessage = document.getElementById('thank-you-message');

            submitBtn.disabled = true;
            submitBtn.innerText = 'Processing...';

            const formData = new FormData(form);

            /* * IMPORTANT: You must check your inbox/spam folder for an activation email from FormSubmit 
             * after your FIRST test submission and click "Activate Form".
             */
            const formSubmitUrl = 'https://formsubmit.co/ajax/agape.wael@gmail.com'; 

            fetch(formSubmitUrl, {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                formContainer.style.display = 'none';
                thankYouMessage.style.display = 'block';
            })
            .catch(error => {
                console.error('Error:', error);
                formContainer.style.display = 'none';
                thankYouMessage.style.display = 'block';
            });
        });
    </script>
</body>
</html>
